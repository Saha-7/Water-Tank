<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Water Tank Problem</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header>
      <h1><span class="water">Water</span> <span class="tank">Tank</span></h1>
      <p>Compute trapped water units between blocks</p>
    </header>

    <main class="card">
      <!-- Input -->
      <div class="input-row">
        <div class="input-wrapper">
          <label for="heights-input">Block Heights</label>
          <input
            id="heights-input"
            type="text"
            placeholder="e.g. 0, 4, 0, 0, 0, 6, 0, 6, 4, 0"
            autocomplete="off"
          />
          <span class="error-message" id="error-message"></span>
        </div>
        <button id="compute-btn">Compute</button>
      </div>

      <!-- Result + Visualization -->
      <section id="result-section">
        <div class="divider"></div>

        <p class="result-label">Trapped Water</p>
        <p class="result-value">
          <span id="water-count">0</span>
          <span>&nbsp;units</span>
        </p>

        <div class="legend">
          <div class="legend-item">
            <div class="legend-dot block"></div>
            Block
          </div>
          <div class="legend-item">
            <div class="legend-dot water"></div>
            Trapped Water
          </div>
        </div>

        <div id="svg-container"></div>
      </section>
    </main>


    <script src="js/algorithm.js"></script>
    <script src="js/render.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
